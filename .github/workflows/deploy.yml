name: Deploy to Beget

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install
      - run: npx vite build

      - name: Deploy to Beget via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ilyara3j.beget.tech
          username: ilyara3j
          password: ${{ secrets.BEGET_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: robinbobin.ru/public_html/
          dangerous-clean-slate: true

      - name: Fix file permissions
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1
          lftp -u "ilyara3j,${{ secrets.BEGET_FTP_PASSWORD }}" -e "
            set ftp:ssl-allow no
            cd robinbobin.ru/public_html
            chmod 755 .
            chmod 755 assets
            chmod 755 images
            chmod 755 images/menu
            chmod 755 api
            glob -a chmod 644 *
            glob -a chmod 644 assets/*
            glob -a chmod 644 images/*
            glob -a chmod 644 images/menu/*
            glob -a chmod 644 api/*
            quit
          " ftp://ilyara3j.beget.tech
